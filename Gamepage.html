
<!DOCTYPE html>
<html>
<head>
<title>Game Name</title>

<style>
body { 
    margin: 0;
    font-family: roboto;
    background-color: #000000;
    color: white; 
    }
    .game-header {
    display: flex;
    justify-content: space-between; 
    align-items: center;
    background-color: #0f3460;
    padding: 15px 30px; 
    border-bottom: 3px solid #e94560; 
    }
    .logo {
    font-size: 1.8rem; 
    font-weight: bold; color: #fff;
    text-shadow: 0 0 10px #e94560; 
    }
    .nav-links {
    list-style: none;
    display: flex;
    gap: 15px; 
    }
    .nav-links a { 
    text-decoration: none;
    color: #fff; 
    padding: 10px 20px; 
    transition: 0.3s;
    border-radius: 5px; 
    text-transform: uppercase; 
    font-size: 0.9rem; 
    }
    .nav-links a:hover, .nav-links a.active {
    background-color: #e94560;
    box-shadow: 0 0 15px #fff; 
    }
    .btn-quit {
     text-decoration: none;
    background-color: transparent;
    border: 2px solid #e94560; 
    color: white;
    padding: 8px 20px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: bold; 
    transition: 0.3s; 
    }
    .btn-quit:hover { 
    background-color: #e94560; 
    color: white; 
    }


.game-content {
    text-align: center;
    padding: 60px 20px;
}

.game-content h1 {
    font-size: 3rem;
    margin-bottom: 20px;
    text-shadow: 0 0 15px #e94560;
}

.game-content p {
    font-size: 20px;
    max-width: 700px;
    margin: 15px auto;
    line-height: 1.6;
}

.buy-button {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 20px;
    background-color: #e94560;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
    text-transform: uppercase;
    font-weight: bold;
    min-width: 250px; 
}

.buy-button:hover {
    background-color: #ff2e63;
    box-shadow: 0 0 20px #e94560;
}
</style>
</head>

<body>

<header class="game-header">
    <div class="logo">Game Name</div>
    <nav>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="Gamepage.html" class="active">The Game</a></li>
            <li><a href="wiki.html">WIKI</a></li>
            <li><a href="about.html">About us</a></li>
        </ul>
    </nav>
    <button class="btn-quit"><a href="https://www.google.com/" style="font-family: Instrument Sarif;color: white ; text-decoration: none;">EXIT</a></button>
</header>

<section class="game-content">
    <h1>Enter Game name</h1>
    <p>
        Game Name is.
    </p>
    <p>
        you can do
    </p>
    <p>
        Are you ready to 
    </p>

    <button id="buyBtn" class="buy-button">Buy Now (100)</button>
</section>

<script>
    let clicks = 100;
    const btn = document.getElementById('buyBtn');

    btn.addEventListener('click', function() {
        clicks--;
        
        if (clicks > 0) {
            btn.textContent = `Buy Now (${clicks})`;
        } else {
            window.location.href = "https://www.google.com";
        }
    });
</script>

</body>
</html>
