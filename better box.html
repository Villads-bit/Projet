<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 30px;
            font-size: 40px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1000px;
            margin: auto;
            padding: 30px;
        }

        .box {
            background: white;
            height: 300px;              
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;            
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            color: black;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .box:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<h1>About Us</h1>

<div class="container">
    <a href="Mekhmetefe.html" class="box">Mekhmetefe</a>
    <a href="Henri.html" class="box">Henri</a>
    <a href="Villads.html" class="box">Villads</a>
    <a href="Théo.html" class="box">Théo</a>
</div>

</body>
</html>
